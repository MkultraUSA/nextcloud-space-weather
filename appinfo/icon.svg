<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="sunGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="60%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <circle cx="32" cy="32" r="30" fill="url(#bgGrad)" stroke="#333366" stroke-width="1"/>
  <!-- Sun -->
  <circle cx="32" cy="30" r="10" fill="url(#sunGrad)"/>
  <!-- Corona rays -->
  <g opacity="0.6">
    <line x1="32" y1="18" x2="32" y2="12" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="20" x2="44" y2="15" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="44" y1="30" x2="50" y2="30" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="40" y1="40" x2="44" y2="45" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="32" y1="42" x2="32" y2="48" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="40" x2="20" y2="45" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="30" x2="14" y2="30" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="24" y1="20" x2="20" y2="15" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- KP-like indicator -->
  <text x="32" y="58" font-size="10" font-weight="bold" fill="#00FF88" text-anchor="middle" font-family="monospace">KP 2</text>
</svg>
